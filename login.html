<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ZenTick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-black text-white" x-data="loginApp()" x-cloak>
    <div class="min-h-screen bg-black flex items-center justify-center p-6 relative">
        <div class="max-w-md w-full bg-zinc-950 p-10 rounded-[40px] border border-zinc-900 shadow-2xl shadow-black/50 flex flex-col items-center">
            <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mb-8 shadow-lg shadow-white/10">
                <i data-lucide="ticket" class="w-8 h-8 text-black"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">ZenTick</h1>
            <p class="text-zinc-500 mb-8 text-center text-sm">Enter your credentials to access the support portal</p>
            
            <div class="w-full space-y-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-zinc-600 uppercase tracking-wider">Email Address</label>
                    <input type="email" x-model="email" class="w-full px-4 py-3 bg-zinc-900 border border-zinc-800 rounded-xl text-sm outline-none focus:bg-black focus:border-white transition-all text-white" placeholder="name@company.com">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-zinc-600 uppercase tracking-wider">Password</label>
                    <input type="password" x-model="password" class="w-full px-4 py-3 bg-zinc-900 border border-zinc-800 rounded-xl text-sm outline-none focus:bg-black focus:border-white transition-all text-white" placeholder="••••••••">
                </div>
                <button @click="handleLogin()" class="w-full py-4 bg-white text-black font-bold rounded-2xl hover:bg-zinc-200 shadow-lg shadow-white/20 transition-all active:scale-95 mt-4">
                    Sign In
                </button>
            </div>
            
            <p class="mt-8 text-[10px] text-zinc-700 uppercase tracking-widest font-bold">Secure Enterprise Support</p>
        </div>
    </div>

    <script>
    function loginApp() {
        return {
            email: 'admin@zentick.com',
            password: 'password', // Test password
            async handleLogin() {
                try {
                    const response = await fetch('auth.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            email: this.email, 
                            password: this.password 
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        localStorage.setItem('zentick_user', JSON.stringify(data.user));
                        
                        if (data.user.role === 'admin') {
                            window.location.href = 'index.html'; 
                        } else {
                            window.location.href = 'user.html'; 
                        }
                    } else {
                        const errorData = await response.json();
                        alert(errorData.error || 'Login failed');
                    }
                } catch (e) {
                    console.error('Login error:', e);
                    alert('Could not connect to the server.');
                }
            },
            init() {
                lucide.createIcons();
            }
        }
    }
    </script>
</body>
</html>
